          {

            roles: [
              { id: 'LE', name: "Left End (LE)", role: "The edge assassin. Pin your ears back and hunt the QB. Set the edge violently in the run game. Nothing gets outside of you. Period.", comps: [{ name: "Myles Garrett", url: "https://www.youtube.com/results?search_query=myles+garrett+highlights" }, { name: "Maxx Crosby", url: "https://www.youtube.com/results?search_query=maxx+crosby+highlights" }] },
              { id: 'RE', name: "Right End (RE)", role: "The blindside nightmare. Same rules as the LE, but you usually attack the QB's blind spot. Squeeze the pocket until it bursts.", comps: [{ name: "Aidan Hutchinson", url: "https://www.youtube.com/results?search_query=aidan+hutchinson+highlights" }, { name: "T.J. Watt", url: "https://www.youtube.com/results?search_query=tj+watt+highlights" }] },

                                  e('a', { key: cIdx, href: comp.url, target: "_blank", rel: "noopener noreferrer", onClick: (evt) => evt.stopPropagation(), className: `text-[11px] px-2.5 py-1.5 rounded-lg font-bold transition-colors ${isHighlighted ? 'bg-blue-950 text-blue-300 hover:bg-slate-800 border border-blue-800' : 'bg-slate-800 text-slate-400 hover:bg-slate-700 border border-slate-700'}` }, comp.name)
                                )
                              )
                            )
                          );
                        })
                      )
                    )
                  );
                })
              ),
              activeTab === 'terminology' && e('div', { className: "grid md:grid-cols-2 lg:grid-cols-3 gap-4" },
                TERMINOLOGY.map((item, idx) =>
                  e('div', { key: idx, className: `bg-slate-900 border ${theme.border} p-6 rounded-2xl` },
                    e('h4', { className: "text-lg font-black text-slate-200 mb-2 pb-2 border-b border-slate-800" }, item.term),
                    e('p', { className: "text-slate-400 text-sm leading-relaxed" }, item.def)
                  )
                )
              )
            ),
            e('div', { className: "hidden lg:block lg:fixed lg:bottom-4 lg:left-4 lg:z-50 lg:w-96 shadow-[0_0_25px_rgba(0,0,0,0.8)] rounded-xl overflow-hidden border border-slate-700/80" },
              e('iframe', { src: "https://open.spotify.com/embed/playlist/0afmcPB2IWTIcrSB2TLGc4?utm_source=generator&theme=0", width: "100%", height: "152", style: { borderRadius: '12px', background: '#0f172a' }, frameBorder: "0", allow: "autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" })
            ),
            e('div', { className: "lg:hidden max-w-6xl mx-auto px-4 md:px-6 mt-8 mb-4" },
              e('div', { className: "w-full md:w-96 shadow-[0_0_25px_rgba(0,0,0,0.8)] rounded-xl overflow-hidden border border-slate-700/80" },
                e('iframe', { src: "https://open.spotify.com/embed/playlist/0afmcPB2IWTIcrSB2TLGc4?utm_source=generator&theme=0", width: "100%", height: "152", style: { borderRadius: '12px', background: '#0f172a' }, frameBorder: "0", allow: "autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" })
              )
            )
          );
        }

        ReactDOM.createRoot(document.getElementById('app')).render(e(App));
    </script>

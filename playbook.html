<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valley Wolves Playbook - EPW Wolfpack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100">
    <div id="app"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script>
        const React = window.React;
        const ReactDOM = window.ReactDOM;
        const e = React.createElement;

        // --- DATA STRUCTURES & THEME ---
        const theme = {
          bg: "bg-slate-950",
          panel: "bg-blue-950",
          border: "border-slate-700",
          text: "text-slate-300",
          textBright: "text-slate-100",
          accent: "text-blue-400",
        };

        const POSITIONS_LIST = [
          { id: 'ALL', label: 'Coach View (All)' },
          { id: 'LE', label: 'Left End (LE)' },
          { id: 'T', label: 'Tackle (T)' },
          { id: 'N', label: 'Nose Tackle (N)' },
          { id: 'RE', label: 'Right End (RE)' },
          { id: 'M', label: 'Mike Linebacker (M)' },
          { id: 'W', label: 'Will Linebacker (W)' },
          { id: 'C', label: 'Corners (C)' },
          { id: 'F', label: 'Free Safety (F)' },
          { id: 'R', label: 'Rover (R)' },
          { id: '$', label: 'Sam Safety ($)' }
        ];

        const POSITIONS_INFO = [
          {
            group: "Defensive Linemen (The Trench Monsters)",
            desc: "You are the tip of the spear. We don't read and react; we attack and destroy. Your job is to reset the line of scrimmage in the offensive backfield.",
            roles: [
              { id: 'LE', name: "Left End (LE)", role: "The edge assassin. Pin your ears back and hunt the QB." },
              { id: 'RE', name: "Right End (RE)", role: "The blindside nightmare. Attack the QB's blind spot." },
              { id: 'T', name: "Tackle (T)", role: "The B-gap bulldozer. You are a wrecking ball." },
              { id: 'N', name: "Nose Tackle (N)", role: "The A-gap anchor. Make the Center regret playing." }
            ]
          },
          {
            group: "Linebackers (The Hit Squad)",
            desc: "The alpha dogs of the defense. You are heat-seeking missiles.",
            roles: [
              { id: 'M', name: "Mike (M)", role: "The field general. You call the shots and plug gaps." },
              { id: 'W', name: "Will (W)", role: "The weak-side enforcer. Use your speed to chase plays." }
            ]
          },
          {
            group: "Defensive Backs (The No-Fly Zone)",
            desc: "The apex predators of the secondary. If the ball is in the air, it belongs to you.",
            roles: [
              { id: 'C', name: "Corners (C)", role: "Island lockdown. Press and suffocate your receiver." },
              { id: 'F', name: "Free Safety (F)", role: "The centerfield headhunter. Read the QB's eyes." },
              { id: 'R', name: "Rover (R)", role: "The weak-side hybrid nightmare. Create chaos." },
              { id: '$', name: "Sam ($)", role: "The strong-side hybrid nightmare. Take away TE." }
            ]
          }
        ];

        const TERMINOLOGY = [
          { term: "Man Coverage", def: "You stick to one specific opponent. Wherever he goes, you go." },
          { term: "Zone Coverage", def: "Guard a specific 'box' or area. Keep your eyes on the QB." },
          { term: "Blitz", def: "Charging at the Quarterback like he owes you lunch money." },
          { term: "Stunt / Twist", def: "Linemen switching spots right after the snap." },
          { term: "Spy", def: "Following the Quarterback everywhere." },
          { term: "Creep Up", def: "Sneaking closer to the line before the snap to disguise blitz." },
          { term: "The 'Prevent'", def: "Used late in the game. Back way up. Keep everything in front of you." }
        ];

        const OFFENSE = [
          { id: 'C', x: 50, y: 35 }, { id: 'LG', x: 56, y: 35 }, { id: 'LT', x: 62, y: 35 },
          { id: 'RG', x: 44, y: 35 }, { id: 'RT', x: 38, y: 35 }, { id: 'Q', x: 50, y: 25 },
          { id: 'X', x: 15, y: 35 }, { id: 'Y', x: 68, y: 35 }, { id: 'Z', x: 85, y: 35 }
        ];

        const defaultTips = {
          'LE': "Hold the edge. Don't let anything outside.",
          'RE': "Hold the edge. Contain the QB.",
          'T': "Control the B-gap. Penetrate if you can.",
          'N': "Control the A-gap. Demand a double team.",
          'M': "Read your keys (Guards). Flow to the ball.",
          'W': "Read your keys. Watch for cutbacks.",
          'C': "Keep your cushion. Don't get beat deep.",
          'F': "Read the QB's eyes. Deep middle is yours.",
          'R': "Protect the flat. Support the run.",
          '$': "Protect the flat. Jam the tight end if he's there."
        };

        const PLAYS = [
          {
            name: "4-2-5 ASTROS CROWN 3",
            type: "Base / Slant",
            desc: "D-Line slants weak. Will and Mike hold gaps. Standard Cover 3 shell behind it."
          },
          {
            name: "4-2-5 BAMA CROWN 3",
            type: "Blitz",
            desc: "Double interior pressure. Will and Mike linebackers blitz straight up the middle A-gaps."
          },
          {
            name: "4-2-5 SHATTER CROWN 3",
            type: "Blitz",
            desc: "Strong side safety ($) blitzes off the edge. Linebackers shift to cover."
          },
          {
            name: "4-2-5 REAPER CROWN 3",
            type: "Blitz",
            desc: "Rover (R) brings heavy pressure from the weak side. Will shifts to cover flat."
          },
          {
            name: "4-2-5 OHIO CROWN 3",
            type: "Blitz",
            desc: "Double edge pressure from both Rover (R) and Sam ($). Linebackers cover middle."
          },
          {
            name: "4-2-5 SOCAL CROWN 3",
            type: "Blitz",
            desc: "Sam ($) blitzes strong side. Defense shifts strong."
          },
          {
            name: "4-2-5 CALI CROWN 3",
            type: "Blitz",
            desc: "Rover blitzes from the weak side. D-line stunts weak."
          },
          {
            name: "4-2-5 RASCAL CROWN 3",
            type: "Blitz",
            desc: "Mike linebacker shoots the strong A-gap. Nose slants to B-gap."
          },
          {
            name: "4-2-5 EARTHQUAKE CROWN 3",
            type: "Max Blitz",
            desc: "All out pressure! Rover, Will, Mike, and Sam ALL BLITZ. Deep 3 coverage behind it."
          },
          {
            name: "4-2-5 WEAK RASCAL CROWN 3",
            type: "Blitz",
            desc: "Overload blitz from the weak side. Rover, Will, and Mike all bring pressure."
          }
        ];

        function FieldDiagram({ activePosFilter }) {
          return e('div', { className: "w-full relative bg-green-900 rounded-xl overflow-hidden border-4 border-slate-700 shadow-2xl aspect-[4/3] max-h-[450px]" },
            e('svg', { viewBox: "0 0 100 100", className: "w-full h-full" },
              e('defs', null,
                e('marker', { id: "arrowhead", markerWidth: "4", markerHeight: "4", refX: "2", refY: "2", orient: "auto" },
                  e('polygon', { points: "0 0, 4 2, 0 4", fill: "#ef4444" })
                )
              ),
              e('g', { stroke: "#ffffff", strokeOpacity: "0.2", strokeWidth: "0.2" },
                [10, 20, 30, 40, 50, 60, 70, 80, 90].map(y =>
                  e('line', { key: `line-${y}`, x1: "0", y1: y, x2: "100", y2: y })
                )
              ),
              e('line', { x1: "0", y1: "38", x2: "100", y2: "38", stroke: "#3b82f6", strokeWidth: "0.5", strokeDasharray: "1 1" }),
              OFFENSE.map((pos, idx) =>
                e('g', { key: `off-${idx}`, transform: `translate(${pos.x}, ${pos.y})` },
                  e('circle', { cx: "0", cy: "0", r: "2.5", fill: "#1e293b", stroke: "#cbd5e1", strokeWidth: "0.3" }),
                  e('text', { x: "0", y: "0.8", fontSize: "2", fill: "#cbd5e1", textAnchor: "middle", fontWeight: "bold" }, pos.id)
                )
              )
            )
          );
        }

        function App() {
          const [activeTab, setActiveTab] = React.useState('playbook');
          const [selectedPlay, setSelectedPlay] = React.useState(PLAYS[0]);
          const [globalFilter, setGlobalFilter] = React.useState('ALL');

          const currentTip = React.useMemo(() => {
            if (globalFilter === 'ALL') return "Select a specific position to learn your assignment!";
            return defaultTips[globalFilter] || "Do your job, read your keys, and tackle hard!";
          }, [globalFilter]);

          return e('div', { className: `min-h-screen ${theme.bg} ${theme.textBright} pb-20` },
            e('header', { className: `${theme.panel} border-b ${theme.border} shadow-lg p-4 md:p-6 sticky top-0 z-10` },
              e('div', { className: "max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4" },
                e('div', { className: "flex items-center gap-3" },
                  e('div', { className: "w-16 h-16 rounded-full overflow-hidden bg-slate-200 border-2 border-slate-400 flex items-center justify-center" },
                    e('img', { src: "https://images.squarespace-cdn.com/content/v1/68266ed95a60b919ec331d15/170b0cb3-7363-4ecd-a1c9-6517e4c51e81/Copy+of+Untitled+%28150+x+150+px%29.png?format=100w", alt: "Valley Wolves", className: "w-full h-full object-cover" })
                  ),
                  e('div', null,
                    e('h1', { className: "text-2xl font-black text-slate-100 uppercase" }, "Valley Wolves"),
                    e('p', { className: "text-sm font-semibold text-slate-300" }, "4-2-5 Defense Playbook")
                  )
                ),
                e('select', {
                  value: globalFilter,
                  onChange: (evt) => setGlobalFilter(evt.target.value),
                  className: "bg-blue-900 border border-slate-600 text-slate-200 text-sm rounded-lg p-2 font-bold"
                },
                  POSITIONS_LIST.map(pos =>
                    e('option', { key: pos.id, value: pos.id }, pos.label)
                  )
                )
              )
            ),
            e('nav', { className: "max-w-6xl mx-auto px-4 md:px-6 pt-6" },
              e('div', { className: `flex space-x-2 overflow-x-auto pb-2 border-b ${theme.border}` },
                [
                  { id: 'dashboard', label: 'Overview' },
                  { id: 'playbook', label: 'Plays' },
                  { id: 'positions', label: 'Positions' },
                  { id: 'terminology', label: 'Terminology' }
                ].map(tab =>
                  e('button', {
                    key: tab.id,
                    onClick: () => setActiveTab(tab.id),
                    className: `px-4 py-3 rounded-t-xl font-bold text-sm whitespace-nowrap transition-all ${
                      activeTab === tab.id 
                        ? 'bg-blue-900 text-slate-200 border-t-2 border-slate-300' 
                        : 'text-slate-500 hover:bg-blue-950/50'
                    }`
                  }, tab.label)
                )
              )
            ),
            e('main', { className: "max-w-6xl mx-auto p-4 md:p-6 mt-4" },
              activeTab === 'dashboard' && e('div', { className: "space-y-6" },
                e('div', { className: `${theme.panel} rounded-2xl p-6 md:p-8 border ${theme.border} shadow-xl` },
                  e('h2', { className: "text-3xl font-black mb-4" }, "Welcome to the Pack 🐺"),
                  e('p', { className: "text-slate-300 text-lg leading-relaxed" }, "The 4-2-5 Defense is built on speed, violence, and communication. We don't wait for the offense to make a move; we dictate the game. Do your job. Read your keys. Tackle hard.")
                )
              ),
              activeTab === 'playbook' && e('div', { className: "grid lg:grid-cols-3 gap-6" },
                e('div', { className: `lg:col-span-1 bg-slate-900 border ${theme.border} rounded-2xl p-4 shadow-xl flex flex-col h-[500px]` },
                  e('h3', { className: "text-lg font-black text-slate-200 mb-4 border-b border-slate-700 pb-2 uppercase" }, "Plays"),
                  e('div', { className: "flex-1 overflow-y-auto space-y-2" },
                    PLAYS.map((play, idx) =>
                      e('button', {
                        key: idx,
                        onClick: () => setSelectedPlay(play),
                        className: `w-full text-left p-3 rounded-xl border transition-all ${
                          selectedPlay.name === play.name 
                            ? 'bg-blue-600 border-blue-400' 
                            : 'bg-slate-950 border-slate-800 hover:border-slate-500'
                        }`
                      },
                        e('span', { className: `font-bold text-sm block ${selectedPlay.name === play.name ? 'text-white' : 'text-slate-300'}` }, play.name),
                        e('span', { className: `text-[10px] uppercase tracking-wider font-semibold ${selectedPlay.name === play.name ? 'text-blue-200' : 'text-red-400'}` }, play.type)
                      )
                    )
                  )
                ),
                e('div', { className: "lg:col-span-2 space-y-6" },
                  e(FieldDiagram, { activePosFilter: globalFilter }),
                  e('div', { className: `bg-slate-900 border ${theme.border} rounded-2xl p-6 shadow-xl` },
                    e('h3', { className: "text-2xl font-black text-white mb-2" }, selectedPlay.name),
                    e('span', { className: "inline-block px-3 py-1 bg-red-500/20 text-red-400 border border-red-500/30 rounded-lg text-xs font-bold" }, selectedPlay.type),
                    e('p', { className: "text-slate-300 font-medium mt-4 mb-6" }, selectedPlay.desc),
                    e('div', { className: "bg-blue-950/50 border border-blue-800/50 rounded-xl p-4" },
                      e('h4', { className: "text-blue-400 font-black text-sm uppercase mb-2" }, "Coach's Tip"),
                      e('p', { className: "text-slate-200 font-bold italic" }, `"${currentTip}"`)
                    )
                  )
                )
              ),
              activeTab === 'positions' && e('div', { className: "space-y-6" },
                POSITIONS_INFO.map((group, idx) =>
                  e('div', { key: idx, className: `bg-slate-900 border ${theme.border} rounded-2xl overflow-hidden shadow-lg` },
                    e('div', { className: "px-6 py-4 bg-blue-800 bg-opacity-20 border-b border-blue-900" },
                      e('h3', { className: "text-xl font-black text-slate-200 uppercase" }, group.group)
                    ),
                    e('div', { className: "p-6" },
                      e('p', { className: "text-slate-300 font-medium mb-6 italic border-l-2 border-slate-600 pl-4" }, `"${group.desc}"`),
                      e('div', { className: "grid md:grid-cols-2 gap-4" },
                        group.roles.map((role, rIdx) =>
                          e('div', {
                            key: rIdx,
                            onClick: () => setGlobalFilter(role.id),
                            className: `p-5 rounded-xl border cursor-pointer transition-all ${
                              globalFilter === role.id 
                                ? 'bg-blue-900/80 border-slate-300' 
                                : 'bg-slate-950 border-slate-800 hover:border-slate-600'
                            }`
                          },
                            e('span', { className: `font-black text-lg block mb-2 ${globalFilter === role.id ? 'text-slate-100' : 'text-blue-400'}` }, role.name),
                            e('span', { className: `text-sm leading-relaxed ${globalFilter === role.id ? 'text-slate-200' : 'text-slate-400'}` }, role.role)
                          )
                        )
                      )
                    )
                  )
                )
              ),
              activeTab === 'terminology' && e('div', { className: "grid md:grid-cols-2 lg:grid-cols-3 gap-4" },
                TERMINOLOGY.map((item, idx) =>
                  e('div', { key: idx, className: `bg-slate-900 border ${theme.border} p-6 rounded-2xl` },
                    e('h4', { className: "text-lg font-black text-slate-200 mb-2 pb-2 border-b border-slate-800" }, item.term),
                    e('p', { className: "text-slate-400 text-sm leading-relaxed" }, item.def)
                  )
                )
              )
            )
          );
        }

        ReactDOM.createRoot(document.getElementById('app')).render(e(App));
    </script>
</body>
</html>

              OFFENSE.map((pos, idx) =>
                e('g', { key: `off-${idx}`, transform: `translate(${pos.x}, ${pos.y})` },
                  e('circle', { cx: "0", cy: "0", r: "2.5", fill: "#1e293b", stroke: "#cbd5e1", strokeWidth: "0.3" }),
                  e('text', { x: "0", y: "0.8", fontSize: "2", fill: "#cbd5e1", textAnchor: "middle", fontWeight: "bold" }, pos.id)
                )
              ),
              play.defense.map((pos, idx) => {
                const isHighlighted = activePosFilter === pos.id || activePosFilter === 'ALL';
                const opacity = isHighlighted ? 1 : 0.2;
                if (pos.path) {
                  return e('path', { key: `path-${idx}`, d: pos.path, fill: "none", stroke: "#ef4444", strokeOpacity: opacity, strokeWidth: "0.6", strokeDasharray: "1 1", markerEnd: "url(#arrowhead)" });
                }
                if (pos.zone) {
                  const yOffset = pos.zone === 'deep' ? 15 : 5;
                  const rx = pos.zone === 'deep' ? 15 : 10;
                  const ry = pos.zone === 'deep' ? 8 : 6;
                  return e('ellipse', { key: `zone-${idx}`, cx: pos.x, cy: pos.y + yOffset, rx, ry, fill: "#3b82f6", fillOpacity: isHighlighted ? 0.2 : 0.05, stroke: "#3b82f6", strokeOpacity: opacity, strokeWidth: "0.3" });
                }
                return null;
              }),
              play.defense.map((pos, idx) => {
                const isHighlighted = activePosFilter === pos.id || activePosFilter === 'ALL';
                const isTargeted = activePosFilter === pos.id;
                let fillColor = theme.playerDefault;
                if (pos.blitz) fillColor = theme.playerBlitz;
                if (isTargeted) fillColor = theme.playerHighlight;
                return e('g', {
                  key: `def-${idx}`,
                  transform: `translate(${pos.x}, ${pos.y})`,
                  onClick: () => onPlayerClick(pos.id),
                  className: `cursor-pointer transition-all duration-300 ${!isHighlighted ? 'opacity-40' : 'opacity-100'}`,
                  style: { filter: isTargeted ? 'drop-shadow(0px 0px 3px rgba(203,213,225,0.8))' : 'none' }
                },
                  e('polygon', { points: "0,-2.5 2.5,2.5 -2.5,2.5", fill: fillColor, stroke: "#ffffff", strokeWidth: "0.3" }),
                  e('text', { x: "0", y: "1.5", fontSize: "2", fill: isTargeted ? '#0f172a' : '#ffffff', textAnchor: "middle", fontWeight: "bold" }, pos.id)
                );
              })
            )
          );
        };

        function App() {
          const [activeTab, setActiveTab] = React.useState('playbook');
          const [selectedPlay, setSelectedPlay] = React.useState(PLAYS[0]);
          const [globalFilter, setGlobalFilter] = React.useState('ALL');

          const currentTip = React.useMemo(() => {
            if (globalFilter === 'ALL') return "Select a specific position above, or click a player on the field to see their specific assignment!";
            if (selectedPlay.tips && selectedPlay.tips[globalFilter]) {
              return selectedPlay.tips[globalFilter];
            }
            return defaultTips[globalFilter] || "Do your job, read your keys, and tackle hard!";
          }, [globalFilter, selectedPlay]);

          const handlePlayerClick = (posId) => {
            setGlobalFilter(posId);
          };

          return e('div', { className: `min-h-screen ${theme.bg} ${theme.textBright} font-sans selection:bg-blue-500 selection:text-white pb-20` },
            e('header', { className: `${theme.panel} border-b ${theme.border} shadow-lg p-4 md:p-6 sticky top-0 z-10` },
              e('div', { className: "max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4" },
                e('div', { className: "flex items-center gap-3" },
                  e('div', { className: "w-16 h-16 rounded-full overflow-hidden bg-slate-200 border-2 border-slate-400 flex items-center justify-center shadow-[0_0_15px_rgba(203,213,225,0.3)]" },
                    e('img', { src: "https://images.squarespace-cdn.com/content/v1/68266ed95a60b919ec331d15/170b0cb3-7363-4ecd-a1c9-6517e4c51e81/Copy+of+Untitled+%28150+x+150+px%29.png?format=100w", alt: "Valley Wolves Logo", className: "w-full h-full object-cover" })
                  ),
                  e('div', null,
                    e('h1', { className: "text-xl md:text-2xl font-black tracking-tight text-slate-100 uppercase" }, "Valley Wolves"),
                    e('p', { className: `text-xs md:text-sm font-semibold ${theme.text} tracking-widest uppercase` }, "Navy & Silver Defense")
                  )
                ),
                e('div', { className: "flex items-center gap-2 bg-slate-900/50 p-2 rounded-xl border border-blue-800" },
                  e('span', { className: "text-xs font-bold text-slate-400 uppercase tracking-wider hidden md:block" }, "Who are you?"),
                  e('select', {
                    value: globalFilter,
                    onChange: (e) => setGlobalFilter(e.target.value),
                    className: "bg-blue-900 border border-slate-600 text-slate-200 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2 outline-none cursor-pointer font-bold"
                  },
                    POSITIONS_LIST.map(pos =>
                      e('option', { key: pos.id, value: pos.id }, pos.label)
                    )
                  )
                )
              )
            ),
            e('nav', { className: "max-w-6xl mx-auto px-4 md:px-6 pt-6" },
              e('div', { className: `flex space-x-2 overflow-x-auto pb-2 scrollbar-hide border-b ${theme.border}` },
                [
                  { id: 'dashboard', label: 'Locker Room' },
                  { id: 'playbook', label: 'Playbook Viewer' },
                  { id: 'positions', label: 'Positional Roles' },
                  { id: 'terminology', label: 'Secret Words' }
                ].map(tab =>
                  e('button', {
                    key: tab.id,
                    onClick: () => setActiveTab(tab.id),
                    className: `px-4 py-3 rounded-t-xl font-bold text-sm whitespace-nowrap transition-all ${
                      activeTab === tab.id 
                        ? `bg-blue-900 text-slate-200 border-t-2 border-slate-300` 
                        : `text-slate-500 hover:bg-blue-950/50 hover:text-slate-300`
                    }`
                  }, tab.label)
                )
              )
            ),
            e('main', { className: "max-w-6xl mx-auto p-4 md:p-6 mt-4" },
              activeTab === 'dashboard' && e('div', { className: "space-y-8 animate-in fade-in duration-300" },
                e('div', { className: `${theme.panel} rounded-2xl p-6 md:p-8 border ${theme.border} shadow-xl relative overflow-hidden` },
                  e('div', { className: "absolute top-0 right-0 w-64 h-64 bg-slate-300/5 rounded-full blur-3xl -mr-20 -mt-20 pointer-events-none" }),
                  e('h2', { className: "text-2xl md:text-3xl font-black mb-4" }, "Welcome to the Pack 🐺"),
                  e('p', { className: `${theme.text} text-base md:text-lg leading-relaxed max-w-3xl` }, "The 4-2-5 Defense is built on speed, violence, and communication. We don't wait for the offense to make a move; we dictate the game. Whether you're eating blocks in the trenches or playing centerfield in the secondary, do your job. Less TikTok, more tackling.")
                )
              ),
              activeTab === 'playbook' && e('div', { className: "grid lg:grid-cols-3 gap-6 animate-in fade-in duration-300" },
                e('div', { className: `lg:col-span-1 bg-slate-900 border ${theme.border} rounded-2xl p-4 md:p-6 shadow-xl flex flex-col h-[500px]` },
                  e('h3', { className: "text-lg font-black text-slate-200 mb-4 border-b border-slate-700 pb-2 uppercase tracking-wider" }, "Select Play"),
                  e('div', { className: "flex-1 overflow-y-auto pr-2 custom-scrollbar space-y-2" },
                    PLAYS.map((play, idx) =>
                      e('button', {
                        key: idx,
                        onClick: () => setSelectedPlay(play),
                        className: `w-full text-left p-3 rounded-xl border transition-all flex flex-col gap-1 ${
                          selectedPlay.name === play.name 
                            ? 'bg-blue-600 border-blue-400 shadow-[0_0_10px_rgba(37,99,235,0.5)]' 
                            : 'bg-slate-950 border-slate-800 hover:border-slate-500 hover:bg-slate-800'
                        }`
                      },
                        e('span', { className: `font-bold text-sm ${selectedPlay.name === play.name ? 'text-white' : 'text-slate-300'}` }, play.name),
                        e('span', { className: `text-[10px] uppercase tracking-wider font-semibold ${selectedPlay.name === play.name ? 'text-blue-200' : 'text-red-400'}` }, play.type)
                      )
                    )
                  )
                ),
                e('div', { className: "lg:col-span-2 space-y-6" },
                  e(FieldDiagram, {
                    play: selectedPlay,
                    activePosFilter: globalFilter,
                    onPlayerClick: handlePlayerClick
                  }),
                  e('div', { className: `bg-slate-900 border ${theme.border} rounded-2xl p-4 md:p-6 shadow-xl` },
                    e('div', { className: "flex flex-col md:flex-row md:items-center justify-between gap-4 mb-4 border-b border-slate-800 pb-4" },
                      e('div', null,
                        e('h3', { className: "text-2xl font-black text-white" }, selectedPlay.name),
                        e('span', { className: "inline-block mt-1 px-3 py-1 bg-red-500/20 text-red-400 border border-red-500/30 rounded-lg text-xs font-bold uppercase tracking-widest" }, selectedPlay.type)
                      )
                    ),
                    e('p', { className: "text-slate-300 font-medium leading-relaxed mb-6" }, selectedPlay.desc),
                    e('div', { className: "bg-blue-950/50 border border-blue-800/50 rounded-xl p-4 relative overflow-hidden" },
                      e('div', { className: "absolute top-0 left-0 w-1 h-full bg-blue-500" }),
                      e('h4', { className: "text-blue-400 font-black text-sm uppercase tracking-wider mb-2" }, `Coach's Tip: ${globalFilter === 'ALL' ? 'General' : POSITIONS_LIST.find(p => p.id === globalFilter)?.label}`),
                      e('p', { className: "text-slate-200 font-bold italic" }, `"${currentTip}"`)
                    )
                  )
                )
              ),
              activeTab === 'positions' && e('div', { className: "space-y-6 animate-in fade-in duration-300" },
                POSITIONS_INFO.map((group, idx) => {
                  if (globalFilter !== 'ALL' && !group.roles.some(r => r.id === globalFilter)) {
                    return null;
                  }
                  return e('div', { key: idx, className: `bg-slate-900 border ${theme.border} rounded-2xl overflow-hidden shadow-lg` },
                    e('div', { className: `px-6 py-4 ${group.color} bg-opacity-20 border-b border-blue-900` },
                      e('h3', { className: "text-xl font-black text-slate-200 tracking-wide uppercase" }, group.group)
                    ),
                    e('div', { className: "p-6" },
                      e('p', { className: "text-slate-300 font-medium mb-6 italic leading-relaxed border-l-2 border-slate-600 pl-4" }, `"${group.desc}"`),
                      e('div', { className: "grid md:grid-cols-2 gap-4" },
                        group.roles.map((role, rIdx) => {
                          const isHighlighted = globalFilter === role.id;
                          return e('div', {
                            key: rIdx,
                            onClick: () => setGlobalFilter(role.id),
                            className: `p-5 rounded-xl border flex flex-col h-full cursor-pointer transition-all duration-300 ${
                              isHighlighted 
                                ? 'bg-blue-900/80 border-slate-300 shadow-[0_0_15px_rgba(203,213,225,0.2)] transform scale-[1.02]' 
                                : 'bg-slate-950 border-slate-800 hover:border-slate-600 hover:bg-slate-900'
                            }`
                          },
                            e('div', { className: "flex-grow" },
                              e('span', { className: `font-black text-lg block mb-2 ${isHighlighted ? 'text-slate-100' : 'text-blue-400'}` }, role.name),
                              e('span', { className: `text-sm leading-relaxed block mb-4 ${isHighlighted ? 'text-slate-200' : 'text-slate-400'}` }, role.role)
                            ),
                            role.comps && e('div', { className: "mt-auto pt-4 border-t border-slate-800/50" },
                              e('span', { className: "text-[10px] uppercase font-black text-slate-500 tracking-widest mb-2 block" }, "Watch The Greats"),
                              e('div', { className: "flex flex-wrap gap-2" },
                                role.comps.map((comp, cIdx) =>
                                  e('a', {
                                    key: cIdx,
                                    href: comp.url,
                                    target: "_blank",
                                    rel: "noopener noreferrer",
                                    onClick: (evt) => evt.stopPropagation(),
                                    className: `text-[11px] px-2.5 py-1.5 rounded-lg font-bold transition-colors ${
                                      isHighlighted 
                                        ? 'bg-blue-950 text-blue-300 hover:bg-slate-800 hover:text-slate-200 border border-blue-800' 
                                        : 'bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-slate-200 border border-slate-700'
                                    }`
                                  }, comp.name)
                                )
                              )
                            )
                          );
                        })
                      )
                    )
                  );
                })
              ),
              activeTab === 'terminology' && e('div', { className: "grid md:grid-cols-2 lg:grid-cols-3 gap-4 animate-in fade-in duration-300" },
                TERMINOLOGY.map((item, idx) =>
                  e('div', { key: idx, className: `bg-slate-900 border ${theme.border} p-6 rounded-2xl hover:border-slate-500 transition-colors` },
                    e('h4', { className: "text-lg font-black text-slate-200 mb-2 pb-2 border-b border-slate-800" }, item.term),
                    e('p', { className: "text-slate-400 text-sm leading-relaxed font-medium" }, item.def)
                  )
                )
              )
            ),
            e('div', { className: "fixed bottom-4 right-4 z-50 w-[calc(100%-2rem)] md:w-80 lg:w-96 shadow-[0_0_25px_rgba(0,0,0,0.8)] rounded-xl overflow-hidden border border-slate-700/80 transition-transform hover:-translate-y-1" },
              e('iframe', {
                src: "https://open.spotify.com/embed/playlist/0afmcPB2IWTIcrSB2TLGc4?utm_source=generator&theme=0",
                width: "100%",
                height: "152",
                style: { borderRadius: '12px', background: '#0f172a' },
                frameBorder: "0",
                allow: "autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
              })
            )
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(App));
    </script>

    <!-- Babel for JSX transformation -->
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
</body>
</html>

          {

            roles: [
              { id: 'LE', name: "Left End (LE)", role: "The edge assassin. Pin your ears back and hunt the QB. Set the edge violently in the run game. Nothing gets outside of you. Period.", comps: [{ name: "Myles Garrett", url: "https://www.youtube.com/results?search_query=myles+garrett+highlights" }, { name: "Maxx Crosby", url: "https://www.youtube.com/results?search_query=maxx+crosby+highlights" }] },
              { id: 'RE', name: "Right End (RE)", role: "The blindside nightmare. Same rules as the LE, but you usually attack the QB's blind spot. Squeeze the pocket until it bursts.", comps: [{ name: "Aidan Hutchinson", url: "https://www.youtube.com/results?search_query=aidan+hutchinson+highlights" }, { name: "T.J. Watt", url: "https://www.youtube.com/results?search_query=tj+watt+highlights" }] },
              { id: 'T', name: "Tackle (T)", role: "The B-gap bulldozer. You are a wrecking ball. Eat double teams like pizza rolls and blow up pulling guards before they even get started.", comps: [{ name: "Chris Jones", url: "https://www.youtube.com/results?search_query=chris+jones+highlights" }, { name: "Jalen Carter", url: "https://www.youtube.com/results?search_query=jalen+carter+highlights" }] },
              { id: 'N', name: "Nose Tackle (N)", role: "The A-gap anchor. Make the Center regret playing football today. Command double teams so your linebackers can run free and make tackles.", comps: [{ name: "Dexter Lawrence", url: "https://www.youtube.com/results?search_query=dexter+lawrence+highlights" }, { name: "Quinnen Williams", url: "https://www.youtube.com/results?search_query=quinnen+williams+highlights" }] }
            ],

        const PLAYS = [
          { name: "4-2-5 ASTROS CROWN 3", type: "Base / Slant", desc: "D-Line slants weak. Will and Mike hold gaps. Standard Cover 3 shell behind it.", defense: [{ id: 'LE', x: 38, y: 40 }, { id: 'T', x: 44, y: 40, path: "M 44 40 L 40 30" }, { id: 'N', x: 56, y: 40, path: "M 56 40 L 52 30" }, { id: 'RE', x: 64, y: 40 }, { id: 'W', x: 46, y: 48 }, { id: 'M', x: 54, y: 48 }, { id: 'R', x: 25, y: 45, zone: 'flat' }, { id: '$', x: 75, y: 45, zone: 'flat' }, { id: 'C', x: 15, y: 50, zone: 'deep' }, { id: 'C', x: 85, y: 50, zone: 'deep' }, { id: 'F', x: 50, y: 70, zone: 'deep' }], tips: { 'T': "Slant hard to the A-gap on the snap. Rip across the center's face.", 'N': "Slant strong to the A-gap. Take the center with you.", 'M': "Stay patient, read the guard, and fill your gap." } },
          { name: "4-2-5 BAMA CROWN 3", type: "Blitz", desc: "Double interior pressure. Will and Mike linebackers blitz straight up the middle A-gaps.", defense: [{ id: 'LE', x: 38, y: 40 }, { id: 'T', x: 44, y: 40 }, { id: 'N', x: 56, y: 40 }, { id: 'RE', x: 64, y: 40 }, { id: 'W', x: 46, y: 48, blitz: true, path: "M 46 48 L 46 30" }, { id: 'M', x: 54, y: 48, blitz: true, path: "M 54 48 L 54 30" }, { id: 'R', x: 25, y: 45, zone: 'flat' }, { id: '$', x: 75, y: 45, zone: 'flat' }, { id: 'C', x: 15, y: 50, zone: 'deep' }, { id: 'C', x: 85, y: 50, zone: 'deep' }, { id: 'F', x: 50, y: 70, zone: 'deep' }], tips: { 'W': "Hit that A-gap like it's the last day of school. Fast and low!", 'M': "A-gap speed run. Meet Will at the Quarterback for a high-five.", 'F': "Both LBs are gone! You have to be hyper-aware of quick slants over the middle." } },
          { name: "4-2-5 SHATTER CROWN 3", type: "Blitz", desc: "Strong side safety ($) blitzes off the edge. Linebackers shift to cover.", defense: [{ id: 'LE', x: 38, y: 40 }, { id: 'T', x: 44, y: 40 }, { id: 'N', x: 56, y: 40 }, { id: 'RE', x: 64, y: 40 }, { id: 'W', x: 46, y: 48, zone: 'flat' }, { id: 'M', x: 54, y: 48, zone: 'flat' }, { id: 'R', x: 25, y: 45, zone: 'flat' }, { id: '$', x: 75, y: 42, blitz: true, path: "M 75 42 Q 72 35 68 25" }, { id: 'C', x: 15, y: 50, zone: 'deep' }, { id: 'C', x: 85, y: 50, zone: 'deep' }, { id: 'F', x: 50, y: 70, zone: 'deep' }], tips: { '$': "Creep up slowly before the snap. Don't give it away! Then explode off the edge.", 'M': "You must cover ground towards the strong side since $ is abandoning his zone.", 'RE': "Slant inside hard to take the tackle with you, clearing the lane for $." } },
          { name: "4-2-5 REAPER CROWN 3", type: "Blitz", desc: "Rover (R) brings heavy pressure from the weak side. Will shifts to cover flat.", defense: [{ id: 'LE', x: 38, y: 40, path: "M 38 40 L 42 30" }, { id: 'T', x: 44, y: 40 }, { id: 'N', x: 56, y: 40 }, { id: 'RE', x: 64, y: 40 }, { id: 'W', x: 46, y: 48, zone: 'flat' }, { id: 'M', x: 54, y: 48, zone: 'flat' }, { id: 'R', x: 25, y: 42, blitz: true, path: "M 25 42 Q 28 35 34 25" }, { id: '$', x: 75, y: 45, zone: 'flat' }, { id: 'C', x: 15, y: 50, zone: 'deep' }, { id: 'C', x: 85, y: 50, zone: 'deep' }, { id: 'F', x: 50, y: 70, zone: 'deep' }], tips: { 'R': "Time the snap. You are the Reaper. Bring the heat off the edge!", 'LE': "Slant inside to the B-gap to pull the tackle away from the Rover.", 'W': "Get to the flat immediately to cover the area vacated by the Rover." } },
          { name: "4-2-5 OHIO CROWN 3", type: "Blitz", desc: "Double edge pressure from both Rover (R) and Sam ($). Linebackers cover middle.", defense: [{ id: 'LE', x: 38, y: 40 }, { id: 'T', x: 44, y: 40 }, { id: 'N', x: 56, y: 40 }, { id: 'RE', x: 64, y: 40 }, { id: 'W', x: 46, y: 48, zone: 'flat' }, { id: 'M', x: 54, y: 48, zone: 'flat' }, { id: 'R', x: 25, y: 42, blitz: true, path: "M 25 42 Q 28 35 34 25" }, { id: '$', x: 75, y: 42, blitz: true, path: "M 75 42 Q 72 35 68 25" }, { id: 'C', x: 15, y: 50, zone: 'deep' }, { id: 'C', x: 85, y: 50, zone: 'deep' }, { id: 'F', x: 50, y: 70, zone: 'deep' }], tips: { 'R': "Squeeze the pocket from the outside. Don't let the QB scramble your way.", '$': "Squeeze from the strong side. Meet the Rover at the QB.", 'W': "Head on a swivel. You and Mike have to cover a lot of ground in the flats." } },

          { name: "4-2-5 SOCAL CROWN 3", type: "Blitz", desc: "Similar to Shatter, Sam ($) blitzes strong side. Defense shifts strong.", defense: [{ id: 'LE', x: 38, y: 40 }, { id: 'T', x: 44, y: 40 }, { id: 'N', x: 56, y: 40 }, { id: 'RE', x: 64, y: 40, path: "M 64 40 L 60 30" }, { id: 'W', x: 46, y: 48, zone: 'flat' }, { id: 'M', x: 54, y: 48, zone: 'flat' }, { id: 'R', x: 25, y: 45, zone: 'flat' }, { id: '$', x: 75, y: 42, blitz: true, path: "M 75 42 Q 72 35 68 25" }, { id: 'C', x: 15, y: 50, zone: 'deep' }, { id: 'C', x: 85, y: 50, zone: 'deep' }, { id: 'F', x: 50, y: 70, zone: 'deep' }], tips: { '$': "Hit the edge with speed. Secure the outside so the QB can't roll out.", 'RE': "Slant hard inside to pull the blockers off the edge blitz.", 'M': "Rotate strong to cover the flat area left open by Sam." } },
          { name: "4-2-5 CALI CROWN 3", type: "Blitz", desc: "Rover blitzes from the weak side. D-line stunts weak.", defense: [{ id: 'LE', x: 38, y: 40, path: "M 38 40 L 42 30" }, { id: 'T', x: 44, y: 40, path: "M 44 40 L 48 30" }, { id: 'N', x: 56, y: 40 }, { id: 'RE', x: 64, y: 40 }, { id: 'W', x: 46, y: 48, zone: 'flat' }, { id: 'M', x: 54, y: 48, zone: 'flat' }, { id: 'R', x: 25, y: 42, blitz: true, path: "M 25 42 Q 30 35 34 25" }, { id: '$', x: 75, y: 45, zone: 'flat' }, { id: 'C', x: 15, y: 50, zone: 'deep' }, { id: 'C', x: 85, y: 50, zone: 'deep' }, { id: 'F', x: 50, y: 70, zone: 'deep' }], tips: { 'R': "Read the snap and bring the heat off the left edge.", 'LE': "Slant inside. Make a mess of the B-gap.", 'W': "Roll to the flat. Read the QB's eyes." } },
          { name: "4-2-5 RASCAL CROWN 3", type: "Blitz", desc: "Mike linebacker shoots the strong A-gap. Nose slants to B-gap.", defense: [{ id: 'LE', x: 38, y: 40 }, { id: 'T', x: 44, y: 40 }, { id: 'N', x: 56, y: 40, path: "M 56 40 L 60 30" }, { id: 'RE', x: 64, y: 40 }, { id: 'W', x: 46, y: 48, zone: 'flat' }, { id: 'M', x: 54, y: 48, blitz: true, path: "M 54 48 L 54 30" }, { id: 'R', x: 25, y: 45, zone: 'flat' }, { id: '$', x: 75, y: 45, zone: 'flat' }, { id: 'C', x: 15, y: 50, zone: 'deep' }, { id: 'C', x: 85, y: 50, zone: 'deep' }, { id: 'F', x: 50, y: 70, zone: 'deep' }], tips: { 'M': "You are the Rascal. Right through the A-gap immediately on snap.", 'N': "Slant out to the B-gap to pull the guard away from Mike.", 'W': "Hold the middle flat zone. Look for crossing routes." } },
          { name: "4-2-5 EARTHQUAKE CROWN 3", type: "Max Blitz", desc: "All out pressure! Rover, Will, Mike, and Sam ALL BLITZ. Deep 3 coverage behind it.", defense: [{ id: 'LE', x: 38, y: 40 }, { id: 'T', x: 44, y: 40 }, { id: 'N', x: 56, y: 40 }, { id: 'RE', x: 64, y: 40 }, { id: 'W', x: 46, y: 48, blitz: true, path: "M 46 48 L 46 30" }, { id: 'M', x: 54, y: 48, blitz: true, path: "M 54 48 L 54 30" }, { id: 'R', x: 25, y: 42, blitz: true, path: "M 25 42 Q 28 35 34 25" }, { id: '$', x: 75, y: 42, blitz: true, path: "M 75 42 Q 72 35 68 25" }, { id: 'C', x: 15, y: 50, zone: 'deep' }, { id: 'C', x: 85, y: 50, zone: 'deep' }, { id: 'F', x: 50, y: 70, zone: 'deep' }], tips: { 'C': "No flat help! If they throw short, rally to tackle.", 'F': "You are on an island in the middle. Read the QB, make a play on the ball.", 'W': "Total chaos! Meet the other 3 blitzers at the QB." } },
          { name: "4-2-5 WEAK RASCAL CROWN 3", type: "Blitz", desc: "Overload blitz from the weak side. Rover, Will, and Mike all bring pressure.", defense: [{ id: 'LE', x: 38, y: 40, path: "M 38 40 L 42 30" }, { id: 'T', x: 44, y: 40, path: "M 44 40 L 48 30" }, { id: 'N', x: 56, y: 40 }, { id: 'RE', x: 64, y: 40 }, { id: 'W', x: 46, y: 48, blitz: true, path: "M 46 48 L 46 30" }, { id: 'M', x: 54, y: 48, blitz: true, path: "M 54 48 L 54 30" }, { id: 'R', x: 25, y: 42, blitz: true, path: "M 25 42 Q 28 35 34 25" }, { id: '$', x: 75, y: 45, zone: 'flat' }, { id: 'C', x: 15, y: 50, zone: 'deep' }, { id: 'C', x: 85, y: 50, zone: 'deep' }, { id: 'F', x: 50, y: 70, zone: 'deep' }], tips: { 'R': "Overload weak! Come off the edge hot.", 'W': "Hit the A-gap. The O-line won't know who to block.", 'M': "Hit the strong A-gap. Bring the house!" } }
        ];

        function FieldDiagram({ play, activePosFilter, onPlayerClick }) {
          return e('div', { className: "w-full relative bg-green-900 rounded-xl overflow-hidden border-4 border-slate-700 shadow-2xl aspect-[4/3] max-h-[450px]" },
            e('svg', { viewBox: "0 0 100 100", className: "w-full h-full" },
              e('defs', null,
                e('marker', { id: "arrowhead", markerWidth: "4", markerHeight: "4", refX: "2", refY: "2", orient: "auto" },
                  e('polygon', { points: "0 0, 4 2, 0 4", fill: "#ef4444" })
                )
              ),
              e('g', { stroke: "#ffffff", strokeOpacity: "0.2", strokeWidth: "0.2" },
                [10, 20, 30, 40, 50, 60, 70, 80, 90].map(y =>
                  e('line', { key: `line-${y}`, x1: "0", y1: y, x2: "100", y2: y })
                ),
                [10, 20, 30, 40, 50, 60, 70, 80, 90].map(y =>
                  e(Fragment, { key: `hash-${y}` },
                    e('line', { x1: "33", y1: y, x2: "35", y2: y }),
                    e('line', { x1: "65", y1: y, x2: "67", y2: y })
                  )
                )
              ),
              e('line', { x1: "0", y1: "38", x2: "100", y2: "38", stroke: "#3b82f6", strokeWidth: "0.5", strokeDasharray: "1 1" }),
              OFFENSE.map((pos, idx) =>
                e('g', { key: `off-${idx}`, transform: `translate(${pos.x}, ${pos.y})` },
                  e('circle', { cx: "0", cy: "0", r: "2.5", fill: "#1e293b", stroke: "#cbd5e1", strokeWidth: "0.3" }),
                  e('text', { x: "0", y: "0.8", fontSize: "2", fill: "#cbd5e1", textAnchor: "middle", fontWeight: "bold" }, pos.id)
                )
              ),
              play.defense.map((pos, idx) => {
                const isHighlighted = activePosFilter === pos.id || activePosFilter === 'ALL';
                const opacity = isHighlighted ? 1 : 0.2;
                if (pos.path) return e('path', { key: `path-${idx}`, d: pos.path, fill: "none", stroke: "#ef4444", strokeOpacity: opacity, strokeWidth: "0.6", strokeDasharray: "1 1", markerEnd: "url(#arrowhead)" });
                if (pos.zone) {
                  const yOffset = pos.zone === 'deep' ? 15 : 5;
                  const rx = pos.zone === 'deep' ? 15 : 10;
                  const ry = pos.zone === 'deep' ? 8 : 6;
                  return e('ellipse', { key: `zone-${idx}`, cx: pos.x, cy: pos.y + yOffset, rx, ry, fill: "#3b82f6", fillOpacity: isHighlighted ? 0.2 : 0.05, stroke: "#3b82f6", strokeOpacity: opacity, strokeWidth: "0.3" });
                }
                return null;
              }),
              play.defense.map((pos, idx) => {
                const isHighlighted = activePosFilter === pos.id || activePosFilter === 'ALL';
                const isTargeted = activePosFilter === pos.id;
                let fillColor = "#1e3a8a";
                if (pos.blitz) fillColor = "#dc2626";
                if (isTargeted) fillColor = "#cbd5e1";
                return e('g', { key: `def-${idx}`, transform: `translate(${pos.x}, ${pos.y})`, onClick: () => onPlayerClick(pos.id), className: `cursor-pointer transition-all duration-300 ${!isHighlighted ? 'opacity-40' : 'opacity-100'}`, style: { filter: isTargeted ? 'drop-shadow(0px 0px 3px rgba(203,213,225,0.8))' : 'none' } },
                  e('polygon', { points: "0,-2.5 2.5,2.5 -2.5,2.5", fill: fillColor, stroke: "#ffffff", strokeWidth: "0.3" }),
                  e('text', { x: "0", y: "1.5", fontSize: "2", fill: isTargeted ? '#0f172a' : '#ffffff', textAnchor: "middle", fontWeight: "bold" }, pos.id)
                );
              })
            )
          );
        }

        function App() {
          const [activeTab, setActiveTab] = React.useState('playbook');
          const [selectedPlay, setSelectedPlay] = React.useState(PLAYS[0]);
          const [globalFilter, setGlobalFilter] = React.useState('ALL');

          const currentTip = React.useMemo(() => {
            if (globalFilter === 'ALL') return "Select a specific position above, or click a player on the field to see their specific assignment!";
            if (selectedPlay.tips && selectedPlay.tips[globalFilter]) return selectedPlay.tips[globalFilter];
